name: Release Readiness

on:
  workflow_dispatch:
    inputs:
      require_clean_git:
        description: Require a clean working tree during release readiness checks
        required: true
        default: true
        type: boolean
      skip_editable_install:
        description: Skip the editable install step inside scripts/release-check.ps1
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-check:
    name: release check (windows-2025-vs2026, 3.12)
    runs-on: windows-2025-vs2026
    timeout-minutes: 20
    env:
      REQUIRE_CLEAN_GIT: ${{ inputs.require_clean_git }}
      SKIP_EDITABLE_INSTALL: ${{ inputs.skip_editable_install }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run release readiness check
        shell: pwsh
        run: |
          $arguments = @()
          $summaryPath = Join-Path $env:RUNNER_TEMP "agentledger-release-check.json"
          $markdownSummaryPath = Join-Path $env:RUNNER_TEMP "agentledger-release-check-summary.md"
          if ($env:SKIP_EDITABLE_INSTALL -eq "true") {
              $arguments += "-SkipEditableInstall"
          }
          if ($env:REQUIRE_CLEAN_GIT -eq "true") {
              $arguments += "-RequireCleanGit"
          }
          $arguments += @("-JsonOutput", $summaryPath)

          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/release-check.ps1 @arguments
          $exitCode = $LASTEXITCODE
          if (Test-Path -LiteralPath $summaryPath) {
              Write-Host ""
              Write-Host "== Release readiness JSON summary =="
              Get-Content -Raw -LiteralPath $summaryPath

              python scripts/release_check_summary.py $summaryPath --output $markdownSummaryPath
              $summaryExitCode = $LASTEXITCODE
              if (Test-Path -LiteralPath $markdownSummaryPath) {
                  Write-Host ""
                  Write-Host "== Release readiness Markdown summary =="
                  Get-Content -Raw -LiteralPath $markdownSummaryPath
                  if ($env:GITHUB_STEP_SUMMARY) {
                      Get-Content -Raw -LiteralPath $markdownSummaryPath | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  }
              }
              if (($summaryExitCode -ne 0) -and ($exitCode -eq 0)) {
                  $exitCode = $summaryExitCode
              }
          }
          exit $exitCode
