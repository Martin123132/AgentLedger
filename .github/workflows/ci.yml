name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest

      - name: Run install check (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/install-check.ps1

      - name: Run smoke checks (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/smoke.ps1

      - name: Run smoke checks (Unix)
        if: runner.os != 'Windows'
        run: bash ./scripts/smoke.sh
