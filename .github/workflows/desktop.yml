name: Desktop Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/agentledger/**"
      - "packaging/windows/**"
      - "scripts/desktop_entry.py"
      - "scripts/build-desktop.ps1"
      - "scripts/write_desktop_manifest.py"
      - ".github/workflows/desktop.yml"
      - "pyproject.toml"
  push:
    branches: [master]
    paths:
      - "src/agentledger/**"
      - "packaging/windows/**"
      - "scripts/desktop_entry.py"
      - "scripts/build-desktop.ps1"
      - "scripts/write_desktop_manifest.py"
      - ".github/workflows/desktop.yml"
      - "pyproject.toml"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  windows-desktop:
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install desktop build dependencies
        run: python -m pip install -e ".[desktop]"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build desktop application
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/build-desktop.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: AgentLedger-windows-x64
          path: dist/desktop/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    if: github.event_name == 'release'
    needs: windows-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download desktop artifact
        uses: actions/download-artifact@v6
        with:
          name: AgentLedger-windows-x64
          path: desktop-artifacts

      - name: Attach files to published release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" desktop-artifacts/* --clobber
